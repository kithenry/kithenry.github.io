<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Option 1: Include in HTML -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/index.css">
    <title>Contact Me</title>

    <style>
        /* Highlight color change on focus */
        .form-control:focus {
            border-color: var(--secondary-color);
            /* Change this to your preferred highlight color */
            box-shadow: 0 0 0 .3rem rgba(56, 156, 169, 0.25);
            /* Adjust shadow color and intensity */
        }
    </style>
</head>

<body>
    <header>

    </header>
    <div class="container-fluid p-0">
        <div class="container">
            <div class="main-content">
                <div class="card m-3">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">Send Me A Message</h5>
                        <form action="" class="p-2">
                            <div class="form-floating mb-3">
                                <input type="name" class="form-control" id="floatingInput"
                                    placeholder="name@example.com">
                                <label for="floatingInput">Names</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingInput"
                                    placeholder="name@example.com">
                                <label for="floatingPassword">Email</label>
                            </div>
                            <div class="form-floating mb-3">
                                <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
                                    style="height: 100px"></textarea>
                                <label for="floatingTextarea2">Your message</label>
                            </div>
                            <div class="submit-button">
                                <button class="w-100 text-center button-plain-bg">
                                    <i class="fa fa-paper-plane"></i>
                                    Send
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </div>
    <footer>

    </footer>
    <script src="../assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
